version: 2

models:
  - name: stg_orders
    description: "Orders staging - clean data"
    columns:
      - name: order_id
        description: "Primary key de la orden "
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "FK a customers"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: total_amount
        description: "Total amount of the order"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
  - name: stg_customers
    description: "Customers staging"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null  
  - name: stg_products
    description: "Products staging"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

      - name: price
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
  - name: stg_order_items
    description: "Order items staging"
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null

      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: quantity
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

      - name: unit_price
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0